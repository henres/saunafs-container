name: Build and Push Docker images

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  # ── Step 1 : build saunafs-base ──────────────────────────────────────────
  build-base:
    name: Build saunafs-base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      saunafs_version: ${{ steps.resolve.outputs.saunafs_version }}
      image_tag:       ${{ steps.resolve.outputs.image_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract requested version from git tag
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # Strip leading "v" from the git tag (e.g. v5.7.1 → 5.7.1)
            echo "requested=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "requested=" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve exact apt package version
        id: resolve
        run: |
          REQUESTED="${{ steps.version.outputs.requested }}"

          # Configure the SaunaFS apt repository on the runner
          sudo apt-get install -y --no-install-recommends wget ca-certificates
          wget -qO- "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0xA80B96E2C79457D4" \
            | sudo gpg --dearmor -o /usr/share/keyrings/saunafs-archive-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/saunafs-archive-keyring.gpg] https://repo.saunafs.com/repository/saunafs-ubuntu-24.04/ noble main" \
            | sudo tee /etc/apt/sources.list.d/saunafs.list
          sudo apt-get update -o Dir::Etc::sourcelist="sources.list.d/saunafs.list" \
                               -o Dir::Etc::sourceparts="-" \
                               -o APT::Get::List-Cleanup="0"

          if [[ -z "${REQUESTED}" ]]; then
            # No version requested: use latest, tag image as "latest"
            SAUNAFS_VERSION=""
            IMAGE_TAG="latest"
          else
            # Resolve the latest debian revision matching the requested version
            RESOLVED=$(apt-cache show saunafs-master \
              | grep "^Version:" \
              | awk '{print $2}' \
              | grep "^${REQUESTED}" \
              | sort -V | tail -1)
            if [[ -z "${RESOLVED}" ]]; then
              echo "ERROR: No apt package found matching version '${REQUESTED}'" >&2
              exit 1
            fi
            echo "Resolved '${REQUESTED}' → '${RESOLVED}'"
            SAUNAFS_VERSION="${RESOLVED}"
            IMAGE_TAG="${REQUESTED}"
          fi

          echo "saunafs_version=${SAUNAFS_VERSION}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}"             >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push saunafs-base
        uses: docker/build-push-action@v6
        with:
          context: ./saunafs-base
          file: ./saunafs-base/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/saunafs-base:${{ steps.resolve.outputs.image_tag }}
          build-args: |
            SAUNAFS_VERSION=${{ steps.resolve.outputs.saunafs_version }}
          cache-from: type=gha,scope=saunafs-base
          cache-to:   type=gha,scope=saunafs-base,mode=max

  # ── Step 2 : build service images (parallel) ─────────────────────────────
  build-services:
    name: Build ${{ matrix.service }}
    needs: build-base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        service:
          - saunafs-master
          - saunafs-metalogger
          - saunafs-chunkserver
          - saunafs-cgiserver
          - saunafs-client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ needs.build-base.outputs.image_tag }}
          build-args: |
            BASE_IMAGE=${{ env.IMAGE_PREFIX }}/saunafs-base:${{ needs.build-base.outputs.image_tag }}
            SAUNAFS_VERSION=${{ needs.build-base.outputs.saunafs_version }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to:   type=gha,scope=${{ matrix.service }},mode=max
