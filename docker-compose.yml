x-leilfs-build-args: &leilfs-build-args
  args:
    BASE_IMAGE: ${LEILFS_REGISTRY:+${LEILFS_REGISTRY}/}leilfs-base:${LEILFS_IMAGE_TAG:-latest}
    SAUNAFS_VERSION: ${SAUNAFS_VERSION:-}

# Image naming:
#   LEILFS_REGISTRY  — registry + owner prefix (e.g. "ghcr.io/leil-io/leilfs-container")
#                       leave unset for local builds (images named "leilfs-*")
#   LEILFS_IMAGE_TAG — image tag (default: "latest")
#   SAUNAFS_VERSION   — LeilFS apt package version to install (default: latest available)
#
# Examples:
#   docker compose --profile build build                                    # build all images incl. base
#   SAUNAFS_VERSION=3.14.0 docker compose --profile build build            # pinned version
#   docker compose up                                                       # start the cluster
#   LEILFS_REGISTRY=ghcr.io/leil-io/leilfs-container docker compose push  # push to ghcr.io

services:
  # Build-only service: builds leilfs-base which all other images depend on.
  # Not started by "docker compose up" (restricted to the "build" profile).
  base:
    image: ${LEILFS_REGISTRY:+${LEILFS_REGISTRY}/}leilfs-base:${LEILFS_IMAGE_TAG:-latest}
    build:
      context: ./leilfs-base
      args:
        SAUNAFS_VERSION: ${SAUNAFS_VERSION:-}


  master:
    image: ${LEILFS_REGISTRY:+${LEILFS_REGISTRY}/}leilfs-master:${LEILFS_IMAGE_TAG:-latest}
    container_name: "leilfs-master"
    build:
      context: ./leilfs-master
      <<: *leilfs-build-args
    depends_on:
      - base
    ports:
      - "29421:9421"
    volumes:
      - ./volumes/leilfs-master/etc/saunafs:/etc/saunafs/
      - ./volumes/leilfs-master/var/lib/saunafs/:/var/lib/saunafs/
      - ./volumes/leilfs-master/var/log/:/var/log/
    networks:
      - leilfsnet

  metalogger:
    image: ${LEILFS_REGISTRY:+${LEILFS_REGISTRY}/}leilfs-metalogger:${LEILFS_IMAGE_TAG:-latest}
    container_name: "leilfs-metalogger"
    build:
      context: ./leilfs-metalogger
      <<: *leilfs-build-args
    depends_on:
      - base
    volumes:
      - ./volumes/leilfs-metalogger/etc/saunafs:/etc/saunafs/
      - ./volumes/leilfs-metalogger/var/lib/saunafs/:/var/lib/saunafs/
      - ./volumes/leilfs-metalogger/var/log/:/var/log/
    networks:
      - leilfsnet

  cgi:
    image: ${LEILFS_REGISTRY:+${LEILFS_REGISTRY}/}leilfs-cgiserver:${LEILFS_IMAGE_TAG:-latest}
    container_name: "leilfs-cgiserver"
    build:
      context: ./leilfs-cgiserver
      <<: *leilfs-build-args
    depends_on:
      - base
    ports:
      - "29425:9425"
    networks:
      - leilfsnet

  chunkserver01:
    image: ${LEILFS_REGISTRY:+${LEILFS_REGISTRY}/}leilfs-chunkserver:${LEILFS_IMAGE_TAG:-latest}
    container_name: "leilfs-chunkserver01"
    build:
      context: ./leilfs-chunkserver
      <<: *leilfs-build-args
    depends_on:
      - base
    volumes:
      - ./volumes/leilfs-chunkserver01/etc/saunafs:/etc/saunafs/
      - ./volumes/leilfs-chunkserver01/var/log/:/var/log/
      - ./volumes/leilfs-chunkserver01/var/lib/saunafs:/var/lib/saunafs
      - ./volumes/leilfs-chunkserver01/mnt/hdd001:/mnt/hdd001
      - ./volumes/leilfs-chunkserver01/mnt/hdd002:/mnt/hdd002
    ports:
      - "29431:9422"
    networks:
      - leilfsnet

  chunkserver02:
    image: ${LEILFS_REGISTRY:+${LEILFS_REGISTRY}/}leilfs-chunkserver:${LEILFS_IMAGE_TAG:-latest}
    container_name: "leilfs-chunkserver02"
    build:
      context: ./leilfs-chunkserver
      <<: *leilfs-build-args
    depends_on:
      - base
    volumes:
      - ./volumes/leilfs-chunkserver02/etc/saunafs:/etc/saunafs/
      - ./volumes/leilfs-chunkserver02/var/log/:/var/log/
      - ./volumes/leilfs-chunkserver02/var/lib/saunafs:/var/lib/saunafs
      - ./volumes/leilfs-chunkserver02/mnt/hdd001:/mnt/hdd001
      - ./volumes/leilfs-chunkserver02/mnt/hdd002:/mnt/hdd002
    ports:
      - "29432:9422"
    networks:
      - leilfsnet

  chunkserver03:
    image: ${LEILFS_REGISTRY:+${LEILFS_REGISTRY}/}leilfs-chunkserver:${LEILFS_IMAGE_TAG:-latest}
    container_name: "leilfs-chunkserver03"
    build:
      context: ./leilfs-chunkserver
      <<: *leilfs-build-args
    depends_on:
      - base
    volumes:
      - ./volumes/leilfs-chunkserver03/etc/saunafs:/etc/saunafs/
      - ./volumes/leilfs-chunkserver03/var/log/:/var/log/
      - ./volumes/leilfs-chunkserver03/var/lib/saunafs:/var/lib/saunafs
      - ./volumes/leilfs-chunkserver03/mnt/hdd001:/mnt/hdd001
      - ./volumes/leilfs-chunkserver03/mnt/hdd002:/mnt/hdd002
      - ./volumes/leilfs-chunkserver03/mnt/hdd003:/mnt/hdd003
    ports:
      - "29433:9422"
    networks:
      - leilfsnet

  client:
    image: ${LEILFS_REGISTRY:+${LEILFS_REGISTRY}/}leilfs-client:${LEILFS_IMAGE_TAG:-latest}
    container_name: "leilfs-client"
    devices:
      - /dev/fuse
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    build:
      context: ./leilfs-client
      <<: *leilfs-build-args
    depends_on:
      - base
    command: ["/mnt/saunafs", "-H", "master", "-P", "9421", "-S", "/"]
    volumes:
      - ./volumes/leilfs-client/var/log/:/var/log/
    networks:
      - leilfsnet

networks:
  leilfsnet:
    driver: bridge
